<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Requation Life · Laveen</title>
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://requation.com/desertlife">
  <meta property="og:title"        content="Life Around Urban Farmhouse — Requation Laveen">
  <meta property="og:description"  content="Groceries, coffee, fitness, dining, health & more within the Laveen South Phoenix corridor.">
  <meta property="og:image"        content="https://i.imgur.com/3rFddwE.jpeg">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Life Around Urban Farmhouse — Requation Laveen">
  <meta name="twitter:description" content="Groceries, coffee, fitness, dining, health & more within the Laveen South Phoenix corridor.">
  <meta name="twitter:image"       content="https://i.imgur.com/3rFddwE.jpeg">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#0A0A0A;--cream:#FAF8F4;--aqua:#00CED1;--aqua-dim:rgba(0,206,209,.12);
      --gold:#C9A84C;--rule:rgba(255,255,255,.1);--h:52px
    }
    html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--cream);font-family:'Source Serif 4',serif}
    #map{position:fixed;inset:0;z-index:0}

    /* ── HEADER ── */
    header{
      position:fixed;top:0;left:0;right:0;height:var(--h);z-index:100;
      display:flex;align-items:center;justify-content:space-between;padding:0 24px;
      background:rgba(10,10,10,.88);border-bottom:1px solid var(--rule);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
    }
    .nav-back{
      font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;
      color:var(--aqua);text-decoration:none;text-transform:uppercase;
      display:flex;align-items:center;gap:6px;transition:opacity .2s
    }
    .nav-back:hover{opacity:.7}
    .nav-back::before{content:'←';font-size:.8rem}
    .header-title{
      position:absolute;left:50%;transform:translateX(-50%);
      font-family:'Playfair Display',serif;font-size:1rem;font-weight:500;
      letter-spacing:.04em;color:var(--cream)
    }
    .header-title span{color:var(--aqua);font-weight:600}
    .header-badge{
      font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;
      color:rgba(255,255,255,.4);text-transform:uppercase
    }

    /* ── CATEGORY FILTER BAR ── */
    #cat-bar{
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      z-index:100;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
      padding:10px 16px;
      background:rgba(10,10,10,.82);border:1px solid var(--rule);
      border-radius:40px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      max-width:calc(100vw - 32px)
    }
    .cat-pill{
      font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;
      text-transform:uppercase;color:rgba(255,255,255,.55);
      background:transparent;border:1px solid rgba(255,255,255,.12);
      border-radius:20px;padding:5px 12px;cursor:pointer;
      transition:all .2s;white-space:nowrap
    }
    .cat-pill:hover{color:var(--cream);border-color:rgba(255,255,255,.35)}
    .cat-pill.active{color:var(--ink);background:var(--aqua);border-color:var(--aqua)}

    /* ── COUNT BADGE ── */
    #count-badge{
      position:fixed;top:calc(var(--h) + 12px);right:16px;z-index:90;
      font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;
      color:rgba(255,255,255,.5);background:rgba(10,10,10,.7);
      border:1px solid var(--rule);padding:5px 10px;border-radius:4px;
      backdrop-filter:blur(8px)
    }

    /* ── PROPERTY PIN ── */
    .prop-marker{
      width:22px;height:22px;background:var(--gold);border-radius:50%;
      border:3px solid #fff;box-shadow:0 0 20px rgba(201,168,76,1);
      cursor:pointer;position:relative
    }
    .prop-marker::before{
      content:'';position:absolute;inset:-8px;border-radius:50%;
      border:2px solid rgba(201,168,76,.5);
      animation:prop-pulse 2s ease-out infinite
    }
    .prop-marker::after{
      content:'Urban Farmhouse';
      position:absolute;left:50%;transform:translateX(-50%);
      bottom:calc(100% + 8px);white-space:nowrap;
      background:rgba(10,10,10,.9);color:#C9A84C;
      font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;
      text-transform:uppercase;padding:4px 8px;border-radius:4px;
      border:1px solid rgba(201,168,76,.4);pointer-events:none
    }
    @keyframes prop-pulse{
      0%{transform:scale(1);opacity:.7}
      70%{transform:scale(1.8);opacity:0}
      100%{transform:scale(1.8);opacity:0}
    }

    /* ── POPUP ── */
    .mapboxgl-popup-content{
      background:rgba(10,10,10,.95)!important;color:var(--cream)!important;
      border:1px solid var(--rule)!important;border-radius:8px!important;
      padding:12px 14px!important;font-family:'Source Serif 4',serif!important;
      min-width:180px;backdrop-filter:blur(12px)
    }
    .mapboxgl-popup-tip{border-top-color:rgba(10,10,10,.95)!important}
    .pop-name{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:500;margin-bottom:3px}
    .pop-meta{font-size:.68rem;color:rgba(255,255,255,.5);margin-bottom:8px;letter-spacing:.02em}
    .pop-links{display:flex;gap:6px}
    .pop-link{
      font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;
      text-transform:uppercase;text-decoration:none;padding:4px 8px;
      border-radius:3px;transition:opacity .2s
    }
    .pop-link:hover{opacity:.75}
    .pop-link.redfin{background:var(--aqua);color:var(--ink)}
    .pop-link.yelp{background:rgba(255,255,255,.12);color:var(--cream);border:1px solid var(--rule)}
    .pop-link.waymo{background:#1A73E8;color:#fff}

    /* ── RPOI LISTING PANEL ── */
    #rpoi-panel{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:rgba(15,15,15,.97);border-top:1px solid var(--gold);
      border-radius:16px 16px 0 0;padding:18px 22px 28px;
      max-width:440px;margin:0 auto;
      transform:translateY(100%);transition:transform .45s cubic-bezier(.22,1,.36,1);
      backdrop-filter:blur(16px)
    }
    #rpoi-panel.open{transform:translateY(0)}
    #rpoi-close{position:absolute;top:14px;right:16px;background:none;border:1px solid rgba(255,255,255,.15);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.8rem;color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center}
    #rpoi-tag{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
    #rpoi-addr{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:500;color:var(--cream);margin-bottom:4px;line-height:1.3}
    #rpoi-price{font-size:1.2rem;font-weight:700;color:var(--gold);margin-bottom:6px;font-family:'DM Mono',monospace;letter-spacing:.04em}
    #rpoi-meta{font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:14px;letter-spacing:.04em}
    #rpoi-redfin{display:inline-block;padding:9px 20px;background:var(--gold);color:var(--ink);font-family:'DM Mono',monospace;font-size:.7rem;font-weight:600;text-decoration:none;border-radius:3px;letter-spacing:.08em;text-transform:uppercase}

    /* ── CLUSTER POPUP ── */
    .cluster-pop{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-align:center;padding:4px}

    /* ── ATTRIBUTION ── */
    .mapboxgl-ctrl-attrib{font-size:9px!important;opacity:.4!important}
    @media(max-width:640px){
      .header-title{font-size:.82rem}
      #cat-bar{bottom:16px;gap:4px}
      .cat-pill{font-size:.52rem;padding:4px 9px}
    }
  </style>
</head>
<body>

<header>
  <a href="/laveen" class="nav-back">Urban Farmhouse</a>
  <div class="header-title" onclick="window.location.href='/laveen'" style="cursor:pointer">Requation <span>LIFE</span> · Laveen</div>
  <div class="header-badge" id="header-badge">Loading…</div>
</header>

<div id="map"></div>

<div id="count-badge">— businesses</div>

<div id="rpoi-panel">
  <button id="rpoi-close" onclick="document.getElementById('rpoi-panel').classList.remove('open')">✕</button>
  <div id="rpoi-tag">For Sale · Laveen AZ</div>
  <div id="rpoi-addr">—</div>
  <div id="rpoi-price">—</div>
  <div id="rpoi-meta">—</div>
  <a id="rpoi-redfin" href="#" target="_blank">View on Redfin →</a>
</div>

<div id="cat-bar">
  <button class="cat-pill active" data-cat="all">All</button>
  <button class="cat-pill" data-cat="Grocery">🛒 Grocery</button>
  <button class="cat-pill" data-cat="Hardware">🔨 Hardware</button>
  <button class="cat-pill" data-cat="Coffee">☕ Coffee</button>
  <button class="cat-pill" data-cat="FastFood">🍔 Food</button>
  <button class="cat-pill" data-cat="Cinema">🎬 Cinema</button>
  <button class="cat-pill" data-cat="Dental">🦷 Dental</button>
  <button class="cat-pill" data-cat="MedSpa">💆 Spa</button>
  <button class="cat-pill" data-cat="Gym">💪 Gym</button>
  <button class="cat-pill" data-cat="Fashion">👗 Boutique</button>
</div>

<script>
const SB_URL='https://mpmprnjhunjfeacikgml.supabase.co';
const SB_KEY='sb_publishable_T6XISHd9O2Ol0raPaEASqQ_klUXnyY3';
const SB_HEADERS={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

const CAT_COLOR={
  'Grocery':'#4CAF50','Hardware':'#FF6B35','Coffee':'#8B6E4E',
  'FastFood':'#FFC107','Cinema':'#9C27B0','Dental':'#00BCD4',
  'MedSpa':'#E91E63','Gym':'#F44336','Shoes':'#3F51B5',
  'Fashion':'#FF4081','Cosmetics':'#FF80AB'
};
const KEY_CHAINS=['Whole Foods','Trader Joe\'s','Home Depot','Lowe\'s','Costco','Walmart','Aldi','Harkins','AMC','Regal','LA Fitness','Planet Fitness','Starbucks'];

let allData=[], activeFilter='all';

mapboxgl.accessToken='pk.eyJ1IjoidmlranB1cmkiLCJhIjoiY21uYnF0ZWNuMHhnaTJ3bzR5MG5xOTEzbSJ9.vqmEhPHMBQOn4GX3yrbiGw';

const map=new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/mapbox/standard',
  center:[-112.1180,33.3430],
  zoom:13,
  pitch:55,
  bearing:20,
  antialias:true,
  attributionControl:false
});

map.addControl(new mapboxgl.AttributionControl({compact:true}));
map.addControl(new mapboxgl.NavigationControl({showCompass:true}),'bottom-right');

map.on('load',()=>{
  map.setConfigProperty('basemap','lightPreset','dusk');
  map.setConfigProperty('basemap','show3dObjects',true);
  map.setConfigProperty('basemap','showPointOfInterestLabels',true);
  map.setConfigProperty('basemap','showTransitLabels',true);
  map.setConfigProperty('basemap','showRoadLabels',true);
  map.setConfigProperty('basemap','showPlaceLabels',true);

  // RPOI — Urban Farmhouse property pin
  const el=document.createElement('div');
  el.className='prop-marker';
  el.title='Urban Farmhouse — Requation Laveen';
  el.addEventListener('click',()=>window.location.href='/laveen');
  new mapboxgl.Marker({element:el,anchor:'center'})
    .setLngLat([-112.1180767,33.3427905])
    .addTo(map);

  loadLiving();
  loadAZProperties();
});

async function loadLiving(){
  try{
    const resp=await fetch(SB_URL+'/rest/v1/restaurants?select=*&zip=in.(85339,85041,85042,85044)&limit=500',{headers:SB_HEADERS});
    if(!resp.ok) throw new Error('restaurants fetch failed');
    allData=await resp.json();
    renderLayer(allData);
    document.getElementById('count-badge').textContent=allData.length+' businesses';
    document.getElementById('header-badge').textContent=allData.length+' places';
  }catch(e){
    console.warn(e.message);
    document.getElementById('header-badge').textContent='No data yet';
    document.getElementById('count-badge').textContent='No data';
  }
}

function buildGeoJSON(data){
  return{
    type:'FeatureCollection',
    features:data.map(b=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[parseFloat(b.lng),parseFloat(b.lat)]},
      properties:{
        id:b.id,name:b.name,category:b.category||'Other',chain:b.chain||'',
        rating:b.rating,address:b.address,yelp_url:b.yelp_url||'',
        waymo_url:b.waymo_url||'',
        redfin_url:b.redfin_url||('https://www.redfin.com/zipcode/'+b.zip),
        zip:b.zip,color:CAT_COLOR[b.category]||'#00CED1',
        isKey:KEY_CHAINS.includes(b.chain)||KEY_CHAINS.includes(b.name)
      }
    }))
  };
}

function renderLayer(data){
  const geojson=buildGeoJSON(data);

  ['living-key-circle','living-key-label','living-clusters','living-count','living-points','living-labels'].forEach(id=>{
    if(map.getLayer(id)) map.removeLayer(id);
  });
  if(map.getSource('living')) map.removeSource('living');

  map.addSource('living',{
    type:'geojson',data:geojson,
    cluster:activeFilter==='all',
    clusterMaxZoom:15,clusterRadius:50
  });

  if(activeFilter==='all'){
    map.addLayer({
      id:'living-clusters',type:'circle',source:'living',
      filter:['has','point_count'],
      paint:{
        'circle-color':['step',['get','point_count'],'#00CED1',8,'#00A8AA',20,'#007B7D'],
        'circle-radius':['step',['get','point_count'],20,8,30,20,40],
        'circle-stroke-width':2,'circle-stroke-color':'rgba(255,255,255,.7)',
        'circle-pitch-alignment':'map'
      }
    });
    map.addLayer({
      id:'living-count',type:'symbol',source:'living',
      filter:['has','point_count'],
      layout:{
        'text-field':'{point_count_abbreviated}',
        'text-font':['DIN Offc Pro Bold','Arial Unicode MS Bold'],
        'text-size':13
      },
      paint:{'text-color':'#fff'}
    });
    map.on('click','living-clusters',(e)=>{
      const features=map.queryRenderedFeatures(e.point,{layers:['living-clusters']});
      if(!features.length) return;
      map.getSource('living').getClusterExpansionZoom(features[0].properties.cluster_id,(err,zoom)=>{
        if(err) return;
        map.easeTo({center:features[0].geometry.coordinates,zoom,duration:600});
      });
    });
    map.on('mouseenter','living-clusters',()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave','living-clusters',()=>map.getCanvas().style.cursor='');
  }

  map.addLayer({
    id:'living-points',type:'circle',source:'living',
    filter:['!',['has','point_count']],
    paint:{
      'circle-color':['get','color'],
      'circle-radius':['case',['get','isKey'],11,8],
      'circle-stroke-width':['case',['get','isKey'],3,1.5],
      'circle-stroke-color':'rgba(255,255,255,.8)',
      'circle-pitch-alignment':'map'
    }
  });

  map.addLayer({
    id:'living-labels',type:'symbol',source:'living',
    filter:['all',['!',['has','point_count']],['get','isKey']],
    layout:{
      'text-field':['get','name'],
      'text-font':['DIN Offc Pro Bold','Arial Unicode MS Bold'],
      'text-size':11,'text-offset':[0,1.6],'text-anchor':'top','text-max-width':10
    },
    paint:{
      'text-color':'#FAF8F4','text-halo-color':'rgba(0,0,0,.75)','text-halo-width':1.2
    }
  });

  map.on('click','living-points',(e)=>{
    const p=e.features[0].properties;
    const stars='★'.repeat(Math.floor(p.rating||0))+'☆'.repeat(5-Math.floor(p.rating||0));
    new mapboxgl.Popup({offset:14,closeButton:true,maxWidth:'240px'})
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`
        <div class="pop-name">${p.name}</div>
        <div class="pop-meta">${p.category}${p.rating?' · '+parseFloat(p.rating).toFixed(1)+' '+stars:''}</div>
        <div class="pop-meta" style="margin-bottom:8px">${p.address||''}</div>
        <div class="pop-links">
          <a href="${p.redfin_url}" target="_blank" class="pop-link redfin">Redfin Area</a>
          ${p.yelp_url?`<a href="${p.yelp_url}" target="_blank" class="pop-link yelp">Yelp</a>`:''}
          ${p.waymo_url?`<a href="${p.waymo_url}" target="_blank" class="pop-link waymo">🚗 Waymo</a>`:''}
        </div>`)
      .addTo(map);
  });
  map.on('mouseenter','living-points',()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave','living-points',()=>map.getCanvas().style.cursor='');
}

async function loadAZProperties(){
  try{
    const resp=await fetch(SB_URL+'/rest/v1/properties?select=name,address,price,beds,baths,sqft,lat,lng,redfin_url,zip&zip=in.(85339,85041,85042,85044)&price=gte.750000&mls_status=eq.active',{headers:SB_HEADERS});
    const listings=await resp.json();
    listings.forEach(p=>{
      if(!p.lat||!p.lng) return;
      const el=document.createElement('div');
      el.style.cssText='cursor:pointer;position:relative';
      const dot=document.createElement('div');
      dot.style.cssText='width:16px;height:16px;border-radius:50%;background:#C9A84C;border:2.5px solid #fff;box-shadow:0 0 14px rgba(201,168,76,.9)';
      const ring=document.createElement('div');
      ring.style.cssText='position:absolute;inset:-7px;border-radius:50%;border:2px solid rgba(201,168,76,.45);animation:prop-pulse 2s ease-out infinite;pointer-events:none';
      el.appendChild(ring);
      el.appendChild(dot);
      el.addEventListener('click',()=>{
        document.getElementById('rpoi-addr').textContent=p.address||p.name||'';
        document.getElementById('rpoi-price').textContent=p.price?'$'+Number(p.price).toLocaleString():'';
        document.getElementById('rpoi-meta').textContent=[p.beds&&p.beds+' bd',p.baths&&p.baths+' ba',p.sqft&&Number(p.sqft).toLocaleString()+' sqft'].filter(Boolean).join(' · ');
        const link=document.getElementById('rpoi-redfin');
        link.href=p.redfin_url||'#';
        link.style.display=p.redfin_url?'inline-block':'none';
        document.getElementById('rpoi-panel').classList.add('open');
      });
      new mapboxgl.Marker({element:el,anchor:'center',pitchAlignment:'map',rotationAlignment:'map'})
        .setLngLat([parseFloat(p.lng),parseFloat(p.lat)])
        .addTo(map);
    });
    console.log('Loaded '+listings.length+' AZ property RPOIs');
  }catch(e){console.error('AZ properties load failed',e);}
}

document.querySelectorAll('.cat-pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.cat;
    const filtered=activeFilter==='all'?allData:allData.filter(b=>b.category===activeFilter);
    document.getElementById('count-badge').textContent=filtered.length+' businesses';
    renderLayer(filtered);
  });
});
</script>
</body>
</html>
